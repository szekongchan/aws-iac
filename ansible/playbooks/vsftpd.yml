---
- name: deploy vsftpd
  hosts: all
  vars:
    package: vsftpd
  tasks:
    - name: install vsftpd
      yum:
        name: "{{ package }}"
        state: present
    - name: enable vsftpd
      service:
        name: vsftpd
        enabled: true
    - name: create readme file
      copy:
        content: "wat moet je hier\n"
        dest: /var/ftp/pub/README
        force: no
        mode: 0444
...
